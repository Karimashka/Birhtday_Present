services:
  backend:
    build:
      context: ./backend
    container_name: birthday-backend
    ports:
      - "8000:8000"
    environment:
      - BASE_URL=${BASE_URL:-http://45.91.8.173:8000}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://45.91.8.173}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # URL бэкенда, к которому обращается браузер (не внутри docker сети!)
        VITE_API_URL: ${VITE_API_URL:-http://45.91.8.173:8000}
    container_name: birthday-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
